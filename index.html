<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
  <title>Snake 3D</title>
  <link rel="icon" type="image/png" href="img/favicon.png">

  <!-- Open Graph -->
  <meta property="og:title"       content="Snake 3D">
  <meta property="og:description" content="Un Snake Nokia revisité en 3D — terrain en plein air, classement mondial et sons. Joue dans ton navigateur, sans installation.">
  <meta property="og:image"       content="https://paullux.github.io/snake3d/img/bg-menu.jpg">
  <meta property="og:url"         content="https://paullux.github.io/snake3d/">
  <meta property="og:type"        content="website">
  <meta property="og:locale"      content="fr_FR">

  <!-- Twitter Card -->
  <meta name="twitter:card"        content="summary_large_image">
  <meta name="twitter:title"       content="Snake 3D">
  <meta name="twitter:description" content="Un Snake Nokia revisité en 3D — terrain en plein air, classement mondial et sons.">
  <meta name="twitter:image"       content="https://paullux.github.io/snake3d/img/bg-menu.jpg">
  <style>
    *, *::before, *::after { margin: 0; padding: 0; box-sizing: border-box; }
    body {
      background: #9dc870 url('img/bg-game.jpg') center/cover no-repeat;
      overflow: hidden;
      font-family: 'Segoe UI', system-ui, sans-serif;
      user-select: none;
      -webkit-user-select: none;
    }
    canvas { display: block; }

    /* HUD */
    #hud {
      position: fixed; top: 0; left: 0; right: 0;
      padding: 16px 24px;
      display: flex; justify-content: space-between; align-items: flex-start;
      background: linear-gradient(to bottom, rgba(0,0,0,0.5), transparent);
      z-index: 10; pointer-events: none;
    }
    .score-block { color: #fff; }
    .score-label { font-size: 10px; letter-spacing: 3px; text-transform: uppercase; opacity: 0.6; margin-bottom: 2px; }
    .score-value { font-size: 36px; font-weight: 800; line-height: 1; text-shadow: 0 2px 8px rgba(0,0,0,0.6); }

    /* Overlay */
    #overlay {
      position: fixed; inset: 0;
      display: flex; flex-direction: column; align-items: center; justify-content: center;
      background: url('img/bg-menu.jpg') center/cover no-repeat;
      z-index: 20;
    }
    #overlay::before {
      content: '';
      position: absolute; inset: 0;
      background: rgba(10,28,10,0.68);
      backdrop-filter: blur(4px); -webkit-backdrop-filter: blur(4px);
    }
    #overlay > * { position: relative; z-index: 1; }
    .ov-title {
      font-size: clamp(40px, 10vw, 80px); font-weight: 900;
      color: #76ff03; letter-spacing: 6px; text-transform: uppercase;
      text-shadow: 0 0 30px rgba(118,255,3,0.4), 0 0 60px rgba(118,255,3,0.2);
      margin-bottom: 8px;
    }
    .ov-sub {
      font-size: clamp(12px, 3vw, 15px); color: rgba(255,255,255,0.5);
      letter-spacing: 2px; margin-bottom: 4px;
    }
    #final-score {
      font-size: clamp(18px, 5vw, 28px); color: rgba(255,255,255,0.9);
      margin: 18px 0 4px; display: none;
    }
    #new-best {
      font-size: clamp(12px, 3vw, 15px); color: #ffd740;
      margin-bottom: 4px; display: none;
      letter-spacing: 2px; text-transform: uppercase;
    }
    .play-btn {
      margin-top: 28px; padding: 15px 52px;
      font-size: clamp(14px, 4vw, 20px); font-weight: 700;
      letter-spacing: 3px; text-transform: uppercase;
      background: linear-gradient(135deg, #66bb6a, #2e7d32);
      border: none; border-radius: 50px; color: white; cursor: pointer;
      box-shadow: 0 4px 24px rgba(102,187,106,0.35);
      transition: transform .15s, box-shadow .15s;
    }
    .play-btn:hover { transform: translateY(-2px); box-shadow: 0 8px 32px rgba(102,187,106,0.5); }
    .play-btn:active { transform: translateY(0); }

    /* Leaderboard */
    #lb-wrap {
      display: none; width: 100%; max-width: 310px;
      margin: 14px 0 2px; text-align: left;
    }
    #lb-head {
      font-size: 11px; letter-spacing: 3px; text-transform: uppercase;
      color: rgba(255,255,255,0.5); margin-bottom: 8px; text-align: center;
    }
    #lb-status { font-size: 13px; color: rgba(255,255,255,0.35); text-align: center; }
    #lb-table { width: 100%; border-collapse: collapse; }
    #lb-table tr { transition: background .15s; }
    #lb-table tr.lb-me td { background: rgba(118,255,3,0.13); border-radius: 4px; }
    #lb-table td { padding: 4px 6px; font-size: 13px; color: rgba(255,255,255,0.82); white-space: nowrap; }
    #lb-table td.lb-rank { width: 28px; text-align: center; opacity: .6; }
    #lb-table td.lb-name { width: 100%; overflow: hidden; text-overflow: ellipsis; max-width: 0; }
    #lb-table td.lb-score { font-weight: 800; color: #76ff03; text-align: right; padding-left: 12px; }
    #lb-table tr:first-child td { color: #ffd740; }

    /* Name input */
    #name-wrap { display: none; margin-top: 14px; text-align: center; }
    #name-msg { font-size: 12px; letter-spacing: 2px; color: #76ff03; margin-bottom: 8px; text-transform: uppercase; }
    #name-row { display: flex; gap: 8px; }
    #name-input {
      flex: 1; background: rgba(255,255,255,0.1); border: 1.5px solid rgba(255,255,255,0.25);
      border-radius: 10px; color: #fff; padding: 9px 14px; font-size: 15px; outline: none;
      font-family: inherit;
    }
    #name-input:focus { border-color: #76ff03; }
    #name-ok {
      padding: 9px 18px; background: #66bb6a; border: none; border-radius: 10px;
      color: #fff; font-weight: 700; font-size: 14px; cursor: pointer; font-family: inherit;
      transition: background .15s;
    }
    #name-ok:hover { background: #81c784; }
    #name-ok:disabled { opacity: .5; cursor: default; }

    /* Any-key prompt */
    #any-key {
      display: none; margin-top: 22px;
      font-size: 11px; letter-spacing: 2px; text-transform: uppercase;
      color: rgba(255,255,255,0.55); cursor: pointer;
      animation: blink 1.4s ease-in-out infinite;
    }
    @keyframes blink { 0%,100%{opacity:.25} 50%{opacity:1} }

    /* D-pad */
    #dpad { position: fixed; bottom: 24px; left: 24px; display: none; z-index: 10; }
    @media (pointer: coarse) { #dpad { display: block; } #hint { display: none !important; } }
    .dpad-grid {
      display: grid;
      grid-template-columns: repeat(3, 58px);
      grid-template-rows: repeat(3, 58px);
      gap: 4px;
    }
    .dbtn {
      background: rgba(255,255,255,0.13); border: 1.5px solid rgba(255,255,255,0.22);
      border-radius: 14px; color: white; font-size: 22px; cursor: pointer;
      display: flex; align-items: center; justify-content: center;
      transition: background .1s; -webkit-tap-highlight-color: transparent;
      touch-action: manipulation;
    }
    .dbtn:active { background: rgba(76,175,80,0.45); border-color: rgba(76,175,80,0.7); }

    #hint {
      position: fixed; bottom: 18px; left: 50%; transform: translateX(-50%);
      color: rgba(255,255,255,0.28); font-size: 11px; letter-spacing: 2px;
      pointer-events: none; z-index: 5;
    }

    /* Mute button — top-right so it doesn't overlap the level label */
    #mute-btn {
      position: fixed; top: 14px; right: 24px;
      background: rgba(0,0,0,0.60); border: 2px solid rgba(255,255,255,0.45);
      border-radius: 22px; color: white; font-size: 20px; cursor: pointer;
      width: 46px; height: 46px; display: flex; align-items: center;
      justify-content: center; z-index: 15; transition: background .15s;
      box-shadow: 0 2px 12px rgba(0,0,0,0.5);
      -webkit-tap-highlight-color: transparent;
    }
    #mute-btn:hover { background: rgba(0,0,0,0.80); border-color: rgba(255,255,255,0.7); }

    /* Level badge in HUD center */
    #level-val {
      font-size: 18px; font-weight: 800; letter-spacing: 2px;
      text-transform: uppercase; color: #fff; margin-top: 2px;
      text-shadow: 0 2px 8px rgba(0,0,0,0.7);
    }

    /* Animal countdown timer */
    #animal-timer {
      position: fixed; display: none;
      width: 54px; height: 54px;
      transform: translate(-50%, -130%);
      z-index: 12; pointer-events: none;
    }
    #animal-timer svg {
      position: absolute; inset: 0; width: 100%; height: 100%;
      transform: rotate(-90deg);
    }
    .atimer-bg { fill: none; stroke: rgba(0,0,0,0.45); stroke-width: 3.5; }
    #atimer-arc {
      fill: none; stroke: #76ff03; stroke-width: 3.5; stroke-linecap: round;
      stroke-dasharray: 94.25 94.25; stroke-dashoffset: 0;
    }
    #atimer-secs {
      position: absolute; inset: 0; display: flex; align-items: center; justify-content: center;
      font-size: 20px; font-weight: 800; color: #fff;
      text-shadow: 0 1px 6px rgba(0,0,0,0.95), 0 0 14px rgba(0,0,0,0.8);
    }

    /* Theme crossfade overlay */
    #theme-flash { position:fixed;inset:0;background:#000;opacity:0;pointer-events:none;z-index:30;transition:opacity .32s ease; }

    /* Skin selector */
    #skin-wrap { margin:18px 0 0; text-align:center; }
    #skin-label { font-size:10px;letter-spacing:3px;text-transform:uppercase;color:rgba(255,255,255,0.38);margin-bottom:10px; }
    #skin-btns { display:flex;gap:8px;flex-wrap:wrap;justify-content:center; }
    .skin-btn {
      padding:7px 16px;background:rgba(255,255,255,0.07);
      border:1.5px solid rgba(255,255,255,0.18);border-radius:20px;
      color:rgba(255,255,255,0.55);font-size:12px;cursor:pointer;font-family:inherit;
      letter-spacing:1px;transition:border-color .15s,color .15s,background .15s;
    }
    .skin-btn:hover { border-color:rgba(255,255,255,0.45);color:#fff; }
    .skin-btn.active { border-color:#76ff03;color:#76ff03;background:rgba(118,255,3,0.10); }
  </style>
</head>
<body>

<audio id="bgm" src="audio/music.mp3" loop preload="auto"></audio>
<button id="mute-btn" title="Mute / Unmute">🔊</button>

<div id="hud">
  <div class="score-block">
    <div class="score-label">Score</div>
    <div class="score-value" id="score-val">0</div>
  </div>
  <div class="score-block" style="text-align:center">
    <div class="score-label">Niveau</div>
    <div id="level-val">Prairie</div>
  </div>
  <div class="score-block" style="text-align:right">
    <div class="score-label">Best</div>
    <div class="score-value" id="best-val">0</div>
  </div>
</div>

<div id="overlay">
  <div class="ov-title">SNAKE 3D</div>
  <div class="ov-sub" id="ov-sub">Arrow keys &middot; WASD &middot; Swipe</div>

  <!-- Skin selector — visible on start and game-over screens -->
  <div id="skin-wrap">
    <div id="skin-label">SKIN DU SERPENT</div>
    <div id="skin-btns">
      <button class="skin-btn active" data-skin="0">Classique</button>
      <button class="skin-btn" data-skin="1">N&eacute;on</button>
      <button class="skin-btn" data-skin="2">M&eacute;tal</button>
      <button class="skin-btn" data-skin="3">Pixel</button>
    </div>
  </div>

  <div id="final-score"></div>
  <div id="new-best">&#9733; New Record! &#9733;</div>

  <!-- Leaderboard (visible après game over si Firebase configuré) -->
  <div id="lb-wrap">
    <div id="lb-head">&#127942; CLASSEMENT</div>
    <div id="lb-status">Chargement&#8230;</div>
    <table id="lb-table"></table>
  </div>

  <!-- Saisie du nom si le joueur entre dans le top 10 -->
  <div id="name-wrap">
    <div id="name-msg">Tu entres dans le Top&nbsp;10&nbsp;!</div>
    <div id="name-row">
      <input id="name-input" type="text" placeholder="Ton pseudo" maxlength="16"
             autocomplete="off" spellcheck="false">
      <button id="name-ok">OK</button>
    </div>
  </div>

  <div id="any-key">Appuyez sur une touche pour rejouer</div>
  <button class="play-btn" id="play-btn">PLAY</button>
</div>

<div id="dpad">
  <div class="dpad-grid">
    <div></div><button class="dbtn" id="du">&#9650;</button><div></div>
    <button class="dbtn" id="dl">&#9664;</button><div></div><button class="dbtn" id="dr">&#9654;</button>
    <div></div><button class="dbtn" id="dd">&#9660;</button><div></div>
  </div>
</div>

<div id="theme-flash"></div>

<div id="animal-timer">
  <svg viewBox="0 0 36 36">
    <circle class="atimer-bg" cx="18" cy="18" r="15"/>
    <circle id="atimer-arc" cx="18" cy="18" r="15"/>
  </svg>
  <span id="atimer-secs">10</span>
</div>

<div id="hint">ARROW KEYS &middot; WASD TO MOVE</div>

<script src="https://unpkg.com/three@0.155.0/build/three.min.js"></script>
<script>
'use strict';

// ── CONFIG ───────────────────────────────────────────────────────────────────
const G        = 20;      // grid G×G
const CS       = 1.2;     // cell spacing
const TS       = 1.06;    // tile visual size
const TH       = 0.17;    // tile height
const TUBE_R   = 0.32;    // snake tube radius
const HEAD_R   = 0.38;    // snake head radius
const INIT_SPD = 175;     // ms/tick initial
const MIN_SPD  = 72;      // ms/tick fastest
const CENTER   = G * CS / 2;  // 12

// ── SKINS ─────────────────────────────────────────────────────────────────────
// Extend this array to add new skins: { id, label, body:{}, head:{} }
const SKINS = [
  { id:'classic', label:'Classique',
    body:{ color:0x5cd444, shininess:60,  specular:0x99ff66, emissive:0x000000 },
    head:{ color:0x90ff20, shininess:90,  specular:0xccff55, emissive:0x000000 } },
  { id:'neon',    label:'Néon',
    body:{ color:0x00ffaa, shininess:120, specular:0xaaffee, emissive:0x003322 },
    head:{ color:0x00ffee, shininess:150, specular:0xaaffff, emissive:0x004433 } },
  { id:'metal',   label:'Métal',
    body:{ color:0x8899aa, shininess:200, specular:0xffffff, emissive:0x111518 },
    head:{ color:0xaabbcc, shininess:220, specular:0xffffff, emissive:0x161c20 } },
  { id:'pixel',   label:'Pixel',
    body:{ color:0x33cc33, shininess:0,   specular:0x000000, emissive:0x112211 },
    head:{ color:0x66ff33, shininess:0,   specular:0x000000, emissive:0x223311 } },
];

// ── THEMES ────────────────────────────────────────────────────────────────────
// One theme triggers every 10 apples. Extend this array to add new worlds.
// bg/music filenames follow the pattern: bg-game-{slug}.jpg / music-{slug}.mp3
const THEMES = [
  { name:'Prairie',   bg:'img/bg-game.jpg',                   music:'audio/music.mp3',
    fog:0xc8e896, fogD:0.006, tileA:0x6abf6a, tileB:0x5eb55e, wall:0x2e6b2e,
    ambient:0xd0ebd0, sun:0xfffde7, fill:0xb2dfdb },
  { name:'Arctique',  bg:'img/bg-game-arctique.jpg',           music:'audio/music-arctique.mp3',
    fog:0xC8E4F4, fogD:0.015, tileA:0xDDEEF8, tileB:0xD0E8F5, wall:0x2E7FAA,
    ambient:0xE8F4FF, sun:0xE8C87A, fill:0x5BAFD6 },
  { name:'Désert',    bg:'img/bg-game-desert-egypte.jpg',      music:'audio/music-desert-egypte.mp3',
    fog:0xF5E0A0, fogD:0.012, tileA:0xF0C84A, tileB:0xE8B830, wall:0xC17A2E,
    ambient:0xFFF0D0, sun:0xFFFFFF, fill:0xD4960A },
  { name:'Océan',     bg:'img/bg-game-bateau.jpg',             music:'audio/music-bateau.mp3',
    fog:0xA8D8F0, fogD:0.012, tileA:0xC8913A, tileB:0xB8812A, wall:0xA86C1E,
    ambient:0xD0EEFF, sun:0xF0F8FF, fill:0xF0F8FF },
  { name:'Jungle',    bg:'img/bg-game-jungle.jpg',             music:'audio/music-jungle.mp3',
    fog:0xB8E870, fogD:0.018, tileA:0x7DC44A, tileB:0x6DB43A, wall:0x2D8A28,
    ambient:0xD0FF90, sun:0xF0D020, fill:0xE8721A },
  { name:'Ville',     bg:'img/bg-game-ville.jpg',              music:'audio/music-ville.mp3',
    fog:0xD8E8F0, fogD:0.010, tileA:0xC8AA78, tileB:0xB89A68, wall:0xB87040,
    ambient:0xD8E8F0, sun:0xFFFFFF, fill:0xE04848 },
  { name:'Volcan',    bg:'img/bg-game-volcan.jpg',             music:'audio/music-volcan.mp3',
    fog:0x601010, fogD:0.020, tileA:0x3A2020, tileB:0x2A1010, wall:0xE03A00,
    ambient:0x401010, sun:0xFF7A00, fill:0xFF7A00 },
  { name:'Cyberpunk', bg:'img/bg-game-cyberpunk.jpg',          music:'audio/music-cyberpunk.mp3',
    fog:0x200E38, fogD:0.015, tileA:0x2A1840, tileB:0x1A1030, wall:0x9060D8,
    ambient:0x201038, sun:0x00D8FF, fill:0x9060D8 },
  { name:'Mars',      bg:'img/bg-game-mars.jpg',               music:'audio/music-mars.mp3',
    fog:0xE06010, fogD:0.015, tileA:0xC04000, tileB:0xA03000, wall:0xA03000,
    ambient:0x703010, sun:0xFFD060, fill:0xFFD060 },
];

// ── RENDERER ─────────────────────────────────────────────────────────────────
const renderer = new THREE.WebGLRenderer({ antialias: true, alpha: true });
renderer.setPixelRatio(Math.min(window.devicePixelRatio, 2));
renderer.shadowMap.enabled = true;
renderer.shadowMap.type = THREE.PCFSoftShadowMap;
renderer.setSize(window.innerWidth, window.innerHeight);
document.body.prepend(renderer.domElement);

// ── SCENE ────────────────────────────────────────────────────────────────────
const scene = new THREE.Scene();
scene.fog = new THREE.FogExp2(0xc8e896, 0.006);

// ── PERSPECTIVE CAMERA ───────────────────────────────────────────────────────
// FOV=70 + position at 45° (arctan(30/30)) ensures the full 20×20 grid +
// border walls are visible at all aspect ratios from 9:16 portrait to 21:9.
// Camera at 45° angle (arctan(30/30)). FOV is computed adaptively:
// on landscape we zoom in (FOV≈50°); on portrait we zoom out to keep the full
// grid visible (FOV≈70°). Minimum v-half-angle of 25° ensures depth reads well.
const camera = new THREE.PerspectiveCamera(50, window.innerWidth / window.innerHeight, 0.1, 200);
camera.position.set(CENTER, 30, CENTER + 30);
camera.lookAt(CENTER, 0, CENTER + 3); // aim slightly forward to better fill the frame

// ── LIGHTING ─────────────────────────────────────────────────────────────────
const ambientLight = new THREE.AmbientLight(0xd0ebd0, 0.68);
scene.add(ambientLight);

const sun = new THREE.DirectionalLight(0xfffde7, 1.3);
sun.position.set(CENTER + 8, 20, CENTER - 10);
sun.castShadow = true;
sun.shadow.mapSize.set(2048, 2048);
const sc = sun.shadow.camera;
sc.left = -CENTER - 12; sc.right = CENTER + 12;
sc.top  =  CENTER + 12; sc.bottom = -CENTER - 12;
sc.near = 1; sc.far = 60;
scene.add(sun);

const fill = new THREE.DirectionalLight(0xb2dfdb, 0.28);
fill.position.set(-8, 6, CENTER + 10);
scene.add(fill);

// ── SHARED GEOMETRIES ────────────────────────────────────────────────────────
const tileGeo  = new THREE.BoxGeometry(TS, TH, TS);
const wallGeo  = new THREE.BoxGeometry(TS, TH * 5, TS);
const jointGeo = new THREE.SphereGeometry(TUBE_R, 12, 8);
// Connector: cylinder along Y, will be rotated per segment direction
const connGeo  = new THREE.CylinderGeometry(TUBE_R, TUBE_R, CS, 10, 1);

// ── SHARED MATERIALS ────────────────────────────────────────────────────────
const matTileA = new THREE.MeshLambertMaterial({ color: 0x6abf6a });
const matTileB = new THREE.MeshLambertMaterial({ color: 0x5eb55e });
const matWall  = new THREE.MeshLambertMaterial({ color: 0x2e6b2e });
const matBody  = new THREE.MeshPhongMaterial({ color: 0x5cd444, shininess: 60, specular: 0x99ff66 });
const matHead  = new THREE.MeshPhongMaterial({ color: 0x90ff20, shininess: 90, specular: 0xccff55 });
const matEyeW  = new THREE.MeshLambertMaterial({ color: 0xffffff });
const matEyeB  = new THREE.MeshLambertMaterial({ color: 0x111111 });
const matGrass = new THREE.MeshLambertMaterial({ color: 0x3d7a3d });

// ── SCALE BUMP TEXTURE ───────────────────────────────────────────────────────
// Triangular chevron scales arranged in offset rows — applied as bumpMap on body
(function applyScales() {
  const S = 256, cols = 6, rows = 4;
  const canvas = document.createElement('canvas');
  canvas.width = S; canvas.height = S;
  const ctx = canvas.getContext('2d');
  ctx.fillStyle = '#444';
  ctx.fillRect(0, 0, S, S);

  const cw = S / cols, ch = S / rows;

  for (let row = -1; row <= rows + 1; row++) {
    for (let col = -1; col <= cols + 1; col++) {
      const xOff = (row % 2 === 0) ? 0 : cw / 2;
      const cx = col * cw + xOff + cw / 2;
      const cy = row * ch + ch * 0.35; // anchor near top of cell

      const rx = cw * 0.50, ry = ch * 0.72;

      // Scale shape: arc across the top, tapering to a point at the bottom
      ctx.beginPath();
      ctx.arc(cx, cy, rx, Math.PI * 0.08, Math.PI * 0.92); // top rounded edge
      ctx.lineTo(cx, cy + ry);                              // taper to point
      ctx.closePath();

      // Gradient: bright center → dark edges for bump illusion
      const grad = ctx.createRadialGradient(cx, cy + ry * 0.1, 0, cx, cy + ry * 0.1, ry);
      grad.addColorStop(0.0, '#ffffff');
      grad.addColorStop(0.55, '#cccccc');
      grad.addColorStop(0.85, '#777777');
      grad.addColorStop(1.0,  '#111111');
      ctx.fillStyle = grad;
      ctx.fill();
    }
  }

  const tex = new THREE.CanvasTexture(canvas);
  tex.wrapS = tex.wrapT = THREE.RepeatWrapping;
  tex.repeat.set(2, 3); // 2 repeats around circumference, 3 along length
  matBody.bumpMap   = tex;
  matBody.bumpScale = 0.18;
  matBody.needsUpdate = true;
})();

// ── SKIN APPLICATION ──────────────────────────────────────────────────────────
let activeSkin = +(localStorage.getItem('snk3d_skin') || 0);

function applySkin(idx) {
  activeSkin = idx;
  const sk = SKINS[idx];

// Soft rectangular edge fade — SDF box + smoothstep for natural dissolve
(function() {
  const S = 512, fade = 0.22; // fade = fraction of half-size used for dissolve
  const canvas = document.createElement('canvas');
  canvas.width = canvas.height = S;
  const img = new ImageData(S, S);
  const half = S / 2;
  for (let y = 0; y < S; y++) {
    for (let x = 0; x < S; x++) {
      // distance to nearest edge, normalized 0→edge, 1→centre
      const dx = Math.min(x, S - 1 - x) / half;
      const dy = Math.min(y, S - 1 - y) / half;
      const d  = Math.min(dx, dy) / fade;
      // cubic smoothstep
      const t  = Math.max(0, Math.min(d, 1));
      const a  = t * t * (3 - 2 * t);
      const i  = (y * S + x) * 4;
      img.data[i] = img.data[i+1] = img.data[i+2] = 255;
      img.data[i+3] = Math.round(a * 255);
    }
  }
  const ctx = canvas.getContext('2d');
  ctx.putImageData(img, 0, 0);
  const fadeGrass = new THREE.Mesh(
    new THREE.PlaneGeometry(29, 29),
    new THREE.MeshLambertMaterial({
      color: 0x3d7a3d, transparent: true,
      alphaMap: new THREE.CanvasTexture(canvas),
      depthWrite: false
    })
  );
  fadeGrass.rotation.x = -Math.PI / 2;
  fadeGrass.position.set(CENTER, -TH * 0.5 - 0.02, CENTER);
  scene.add(fadeGrass);
})();

function buildHead() {
  const g = new THREE.Group();

  // Upper half of head — static
  const upper = new THREE.Mesh(
    new THREE.SphereGeometry(HEAD_R, 18, 14, 0, Math.PI * 2, 0, Math.PI / 2),
    matHead
  );
  upper.castShadow = true;
  g.add(upper);

  // Lower jaw — pivots at back of head (z = -HEAD_R*0.5) so front drops open
  const jawPivot = new THREE.Group();
  jawPivot.position.set(0, 0, -HEAD_R * 0.5);
  const lower = new THREE.Mesh(
    new THREE.SphereGeometry(HEAD_R, 18, 14, 0, Math.PI * 2, Math.PI / 2, Math.PI / 2),
    matHead
  );
  lower.castShadow = true;
  lower.position.set(0, 0, HEAD_R * 0.5); // re-centre relative to pivot
  jawPivot.add(lower);

  // Tongue attached to jaw so it moves with the mouth
  const tongueMat = new THREE.MeshLambertMaterial({ color: 0xff1744 });
  const tBase = new THREE.Mesh(new THREE.BoxGeometry(0.06, 0.03, 0.10), tongueMat);
  tBase.position.set(0, -0.08, HEAD_R * 0.5 + 0.28);
  const tL = new THREE.Mesh(new THREE.BoxGeometry(0.025, 0.03, 0.06), tongueMat);
  tL.position.set(-0.04, -0.08, HEAD_R * 0.5 + 0.37);
  const tR = new THREE.Mesh(new THREE.BoxGeometry(0.025, 0.03, 0.06), tongueMat);
  tR.position.set( 0.04, -0.08, HEAD_R * 0.5 + 0.37);
  jawPivot.add(tBase, tL, tR);

  g.add(jawPivot);

  // Eyes on upper part
  const ewGeo = new THREE.SphereGeometry(0.092, 10, 8);
  const ebGeo = new THREE.SphereGeometry(0.057, 8, 6);
  const normalEyes = [];
  [-1, 1].forEach(side => {
    const ew = new THREE.Mesh(ewGeo, matEyeW);
    const eb = new THREE.Mesh(ebGeo, matEyeB);
    ew.position.set(side * 0.20, 0.14, 0.29);
    eb.position.set(side * 0.19, 0.14, 0.345);
    g.add(ew, eb);
    normalEyes.push(ew, eb);
  });

  // X eyes — shown only during death animation
  const xEyes = [];
  const xMat = new THREE.MeshBasicMaterial({ color: 0x111111 });
  [-1, 1].forEach(side => {
    const xg = new THREE.Group();
    [Math.PI / 4, -Math.PI / 4].forEach(a => {
      const arm = new THREE.Mesh(new THREE.BoxGeometry(0.14, 0.028, 0.028), xMat);

    xg.position.set(side * 0.20, 0.14, 0.345);
    xg.visible = false;
    g.add(xg);
    xEyes.push(xg);
  });

  g.userData.jawPivot   = jawPivot;
  g.userData.normalEyes = normalEyes;
  g.userData.xEyes      = xEyes;
  return g;
}

const jointPool = [];
const connPool  = [];

function acquire(pool, makeNew) {
  const m = pool.find(x => !x.userData.used);
  if (m) { m.userData.used = true; m.visible = true; return m; }
  const nm = makeNew();
  nm.userData.used = true;
  pool.push(nm); scene.add(nm);
  return nm;
}
function freePool(pool) {
  pool.forEach(m => { m.userData.used = false; m.visible = false; });
}
function acquireJoint() {
  return acquire(jointPool, () => {
    const m = new THREE.Mesh(jointGeo, matBody);
    m.castShadow = true; return m;
  });
}
function acquireConn() {
  return acquire(connPool, () => {
    const m = new THREE.Mesh(connGeo, matBody);
    m.castShadow = true; return m;
  });
}
function freeAllBody() {
  freePool(jointPool); freePool(connPool);
}

// Setup: create a free Firebase project at https://console.firebase.google.com
//   1. Add a Realtime Database (start in test mode to allow public writes)

const FIREBASE_URL = 'https://snake3d-a8f1c-default-rtdb.europe-west1.firebasedatabase.app';

function escHtml(s) {
  return String(s).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');
}

async function fetchScores() {
  if (!FIREBASE_URL) return [];
  try {
    const res = await fetch(FIREBASE_URL + '/scores.json');
    if (!res.ok) return [];
    const data = await res.json();
    if (!data) return [];
    return Object.values(data)
      .filter(e => e && typeof e.score === 'number' && e.name)
      .sort((a, b) => b.score - a.score)
      .slice(0, 10);
  } catch { return []; }
}

async function postScore(name, scoreVal) {
  if (!FIREBASE_URL) return;
  try {
    await fetch(FIREBASE_URL + '/scores.json', {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({ name: String(name).trim().slice(0, 16), score: scoreVal, t: Date.now() })
    });
  } catch { /* silent */ }
}

function qualifies(scores, scoreVal) {
  if (scoreVal <= 0) return false;
  if (scores.length < 10) return true;
  return scoreVal > scores[scores.length - 1].score;
}

function renderLeaderboard(scores, highlightScore, highlightName) {
  const status = document.getElementById('lb-status');
  const table  = document.getElementById('lb-table');
  if (!scores.length) {
    status.textContent = 'Aucun score pour l\'instant.';
    table.innerHTML = '';
    return;
  }
  status.textContent = '';
  const medals = ['🥇','🥈','🥉'];
  table.innerHTML = scores.map((e, i) => {
    const isMe = highlightName
      ? (e.name === highlightName && e.score === highlightScore)
      : (e.score === highlightScore && i === scores.findIndex(x => x.score === highlightScore));
    return `<tr${isMe ? ' class="lb-me"' : ''}>
      <td class="lb-rank">${medals[i] || (i+1)}</td>
      <td class="lb-name">${escHtml(e.name)}</td>
      <td class="lb-score">${e.score}</td>
    </tr>`;
  }).join('');
}

function getCtx() {
  if (!audioCtx) audioCtx = new (window.AudioContext || window.webkitAudioContext)();
  if (audioCtx.state === 'suspended') audioCtx.resume();
  return audioCtx;
}
function playTone(f1, f2, dur, type = 'sine', vol = 0.22) {
  if (muted) return;
  try {
    const ctx = getCtx();
    const osc = ctx.createOscillator(), gain = ctx.createGain();
    osc.connect(gain); gain.connect(ctx.destination);
    osc.type = type;
    osc.frequency.setValueAtTime(f1, ctx.currentTime);
    osc.frequency.exponentialRampToValueAtTime(f2, ctx.currentTime + dur);
    gain.gain.setValueAtTime(vol, ctx.currentTime);
    gain.gain.exponentialRampToValueAtTime(0.001, ctx.currentTime + dur);
    osc.start(); osc.stop(ctx.currentTime + dur);
  } catch(e) {}
}

function dirToRotY(d) {
  if (d.x ===  1) return  Math.PI / 2;
  if (d.x === -1) return -Math.PI / 2;
  if (d.z ===  1) return  0;
  return Math.PI;
}

function placeFood() {
  const occ = new Set(snake.map(s => s.c + ',' + s.r));
  if (animalPos) occ.add(animalPos.c + ',' + animalPos.r);
  let c, r;
  do { c = (Math.random() * G) | 0; r = (Math.random() * G) | 0; }
  while (occ.has(c + ',' + r));
  food = {c, r};

  foodG.visible = true;

function renderSnake() {
  freeAllBody();
  const y = SEG_Y;

  // Head
  const hp = cellW(snake[0].c, snake[0].r);
  headGroup.position.set(hp.x, y, hp.z);
  headGroup.rotation.y = dirToRotY(dir);
  headGroup.visible = true;

  // Body joints (index 1 → n-1)
  for (let i = 1; i < snake.length; i++) {
    const j = acquireJoint();
    const p = cellW(snake[i].c, snake[i].r);
    j.position.set(p.x, y, p.z);
  }

  // Connectors between every consecutive pair (including head → first body)
  for (let i = 0; i < snake.length - 1; i++) {
    const conn = acquireConn();
    const p1 = cellW(snake[i].c,   snake[i].r);
    const p2 = cellW(snake[i+1].c, snake[i+1].r);
    conn.position.set((p1.x + p2.x) / 2, y, (p1.z + p2.z) / 2);
    // CylinderGeometry default axis = Y; rotate to lie along X or Z
    if (snake[i].r === snake[i+1].r) {
      conn.rotation.set(0, 0, Math.PI / 2);   // same row → x direction
    } else {
      conn.rotation.set(Math.PI / 2, 0, 0);   // same col → z direction
    }
  }
}

  placeFood();
  // Restore saved skin
  applySkin(+(localStorage.getItem('snk3d_skin') || 0));
}

// ── DEATH ANIMATION ──────────────────────────────────────────────────────────
const _camOrigin = new THREE.Vector3(CENTER, 30, CENTER + 30);

function shakeCamera() {
  let i = 0;
  const iv = setInterval(() => {
    camera.position.set(
      _camOrigin.x + (Math.random() - 0.5) * 0.45,
      _camOrigin.y + (Math.random() - 0.5) * 0.20,
      _camOrigin.z + (Math.random() - 0.5) * 0.45
    );
    if (++i >= 8) { clearInterval(iv); camera.position.copy(_camOrigin); camera.lookAt(CENTER, 0, CENTER + 3); }
  }, 45);
}

function startDeathAnim() {
  // Swap eyes to X
  headGroup.userData.normalEyes.forEach(m => { m.visible = false; });
  headGroup.userData.xEyes.forEach(m => { m.visible = true; });
  // Flash red then bone-white
  matBody.color.setHex(0xff2222); matHead.color.setHex(0xff5555);
  matBody.needsUpdate = true; matHead.needsUpdate = true;
  setTimeout(() => {
    matBody.color.setHex(0xd4c9a0); matHead.color.setHex(0xe0d4b0);
    matBody.needsUpdate = true; matHead.needsUpdate = true;
  }, 220);
  shakeCamera();
}

function resetDeathAnim() {
  headGroup.userData.normalEyes.forEach(m => { m.visible = true; });
  headGroup.userData.xEyes.forEach(m => { m.visible = false; });
  // Skin colours restored by applySkin() called just after
}

function preDie() {
  if (state !== 'playing') return;
  state = 'dying';           // freeze game loop
  sndDie();
  bgm.pause();
  mouthTarget = 0;           // close mouth
  startDeathAnim();
  setTimeout(() => die(), 520);
}

function tick() {
  dir = {...nextDir};
  const h = snake[0];
  const nh = {c: h.c + dir.x, r: h.r + dir.z};

  if (nh.c < 0 || nh.c >= G || nh.r < 0 || nh.r >= G) return preDie();

  const ate       = nh.c === food.c && nh.r === food.r;
  const ateAnimal = animalPos && nh.c === animalPos.c && nh.r === animalPos.r;

  // Open mouth when approaching or eating apple OR animal
  const aboutToEat = (nh.c + dir.x === food.c && nh.r + dir.z === food.r) ||
    (animalPos && nh.c + dir.x === animalPos.c && nh.r + dir.z === animalPos.r);
  mouthTarget = (ate || ateAnimal || aboutToEat) ? 1 : 0;

  const grows = ate || ateAnimal;
  const check = grows ? snake : snake.slice(0, -1);
  if (check.some(s => s.c === nh.c && s.r === nh.r)) return preDie();

  snake.unshift(nh);
  if (!grows) snake.pop();
  renderSnake();

  if (ate) {
    sndEat();
    score++;
    document.getElementById('score-val').textContent = score;
    spd = Math.max(MIN_SPD, INIT_SPD - score * 4);
    // Eat marker flash
    const ep = cellW(food.c, food.r);
    eatMarker.position.set(ep.x, SEG_Y, ep.z);
    eatMarker.visible = true;
    if (eatMarkerTimeout) clearTimeout(eatMarkerTimeout);
    eatMarkerTimeout = setTimeout(() => { eatMarker.visible = false; }, 420);
    placeFood();
    // Spawn animal with increasing probability per level
    if (!animalPos && Math.random() < 0.12 + currentTheme * 0.04) spawnAnimal();
  }

  if (ateAnimal) {
    sndEat();
    playTone(800, 1600, 0.14, 'sine', 0.16); // bonus chime
    score += ANIMAL_PTS;
    document.getElementById('score-val').textContent = score;
    spd = Math.max(MIN_SPD, INIT_SPD - score * 4);
    // Quick scale-pop on mouseG before hiding
    mouseG.scale.setScalar(1.5);
    setTimeout(() => { hideAnimal(); }, 80);
  }

  if (ate || ateAnimal) {
    // Level-up every 10 apples (score counts both apple + animal points)
    const newLvl = Math.min(Math.floor(score / 10), THEMES.length - 1);
    if (newLvl !== currentTheme) triggerThemeTransition(newLvl);
  }
}

function showAnyKey() {
  document.getElementById('any-key').style.display = 'block';
}
function showPlayBtn() {
  if (state !== 'scores') return;
  document.getElementById('any-key').style.display = 'none';
  document.getElementById('play-btn').style.display = '';
  state = 'dead';
}

async function die() {
  bgm.pause();   // safety — already paused by preDie() in normal flow
  state = 'scores';
  const newBest = score > best;
  if (newBest) { best = score; localStorage.setItem('snk3d_best', best); }
  document.getElementById('best-val').textContent = best;
  document.getElementById('ov-sub').textContent = '— GAME OVER —';
  const fs = document.getElementById('final-score');
  fs.textContent = 'Score: ' + score; fs.style.display = 'block';
  document.getElementById('new-best').style.display = newBest ? 'block' : 'none';
  document.getElementById('play-btn').textContent = 'PLAY AGAIN';
  document.getElementById('play-btn').style.display = 'none';
  document.getElementById('overlay').style.display = 'flex';

  if (!FIREBASE_URL) { showAnyKey(); return; }

  // Show leaderboard
  const lbWrap = document.getElementById('lb-wrap');
  lbWrap.style.display = 'block';
  document.getElementById('lb-status').textContent = 'Chargement\u2026';
  document.getElementById('lb-table').innerHTML = '';

  const scores = await fetchScores();
  const finalScore = score; // capture before any reset

  if (qualifies(scores, finalScore)) {
    renderLeaderboard(scores, finalScore, null);
    document.getElementById('name-wrap').style.display = 'block';
    document.getElementById('name-input').value = '';
    document.getElementById('name-input').focus();
    document.getElementById('name-ok').disabled = false;
    document.getElementById('name-ok').dataset.score = finalScore;
    // showAnyKey() sera appelé après la soumission du nom
  } else {
    renderLeaderboard(scores, finalScore, null);
    showAnyKey();
  }
}

function startGame() {
  document.getElementById('overlay').style.display = 'none';
  document.getElementById('ov-sub').textContent = 'Arrow keys \u00b7 WASD \u00b7 Swipe';
  document.getElementById('final-score').style.display = 'none';
  document.getElementById('new-best').style.display = 'none';
  document.getElementById('lb-wrap').style.display = 'none';
  document.getElementById('name-wrap').style.display = 'none';
  document.getElementById('any-key').style.display = 'none';
  document.getElementById('play-btn').style.display = '';
  document.getElementById('play-btn').textContent = 'PLAY';
  initGame();
  state = 'playing';
  lastTick = performance.now();
  sndStart();
  startAudio();
}

// ── INPUT ────────────────────────────────────────────────────────────────────
const KEY_MAP = {
  ArrowRight:{x:1,z:0}, d:{x:1,z:0},
  ArrowLeft:{x:-1,z:0}, a:{x:-1,z:0},
  ArrowDown:{x:0,z:1},  s:{x:0,z:1},
  ArrowUp:{x:0,z:-1},   w:{x:0,z:-1},
};
function applyDir(d) {
  if (state !== 'playing') return;
  if (d.x !== 0 && d.x === -dir.x) return;
  if (d.z !== 0 && d.z === -dir.z) return;
  nextDir = d;
}
document.addEventListener('keydown', e => {
  if (document.activeElement.tagName === 'INPUT') return;
  if (state === 'scores') {
    if (document.getElementById('any-key').style.display === 'block') showPlayBtn();
    return;
  }
  if (e.key === 'Enter' || e.key === ' ') { if (state !== 'playing') startGame(); return; }
  const d = KEY_MAP[e.key];
  if (d) { e.preventDefault(); applyDir(d); }
});
document.getElementById('any-key').addEventListener('click', showPlayBtn);
document.getElementById('du').addEventListener('click', () => applyDir({x:0,z:-1}));
document.getElementById('dd').addEventListener('click', () => applyDir({x:0,z:1}));
document.getElementById('dl').addEventListener('click', () => applyDir({x:-1,z:0}));
document.getElementById('dr').addEventListener('click', () => applyDir({x:1,z:0}));
document.getElementById('play-btn').addEventListener('click', startGame);

// ── NAME SUBMISSION ───────────────────────────────────────────────────────────
async function submitName() {
  const input = document.getElementById('name-input');
  const btn   = document.getElementById('name-ok');
  const name  = input.value.trim();
  if (!name) { input.focus(); return; }
  const scoreVal = +(btn.dataset.score || 0);
  btn.disabled = true;
  input.disabled = true;
  document.getElementById('name-wrap').style.display = 'none';
  document.getElementById('lb-status').textContent = 'Envoi\u2026';
  await postScore(name, scoreVal);
  const updated = await fetchScores();
  renderLeaderboard(updated, scoreVal, name);
  showAnyKey();
}
document.getElementById('name-ok').addEventListener('click', submitName);
document.getElementById('name-input').addEventListener('keydown', e => {
  if (e.key === 'Enter') { e.preventDefault(); submitName(); }
});
// Bug fix: re-focus name input if it loses focus while still empty
document.getElementById('name-input').addEventListener('blur', () => {
  setTimeout(() => {
    const wrap  = document.getElementById('name-wrap');
    const input = document.getElementById('name-input');
    if (wrap.style.display !== 'none' && input.value.trim() === '' && !input.disabled) {
      input.focus();
    }
  }, 80);
});

let tStart = null;
window.addEventListener('touchstart', e => {
  tStart = {x: e.touches[0].clientX, y: e.touches[0].clientY};
}, {passive: true});
window.addEventListener('touchend', e => {
  if (!tStart || state !== 'playing') return;
  const dx = e.changedTouches[0].clientX - tStart.x;
  const dy = e.changedTouches[0].clientY - tStart.y;
  tStart = null;
  if (Math.abs(dx) < 15 && Math.abs(dy) < 15) return;
  if (Math.abs(dx) > Math.abs(dy)) applyDir(dx > 0 ? {x:1,z:0} : {x:-1,z:0});
  else applyDir(dy > 0 ? {x:0,z:1} : {x:0,z:-1});
}, {passive: true});

// ── RENDER LOOP ───────────────────────────────────────────────────────────────
function animate(now) {
  requestAnimationFrame(animate);
  if (state === 'playing' && now - lastTick >= spd) {
    tick(); lastTick = now;
  }
  if (foodG.visible) {
    bob += 0.04;
    const baseY = TH / 2 + 0.34 * 0.88 + 0.03;
    foodG.position.y = baseY + Math.sin(bob) * 0.09;
    foodG.rotation.y += 0.02;
  }
  // Animal idle animation + countdown timer
  if (mouseG.visible) {
    const elapsed   = (now - animalSpawnTime) / 1000;
    const remaining = ANIMAL_LIFETIME - elapsed;
    if (remaining <= 0) {
      hideAnimal();
    } else {
      animalBob += 0.035;
      const baseA = TH/2 + 0.22*0.70*1.35 + 0.02;
      mouseG.position.y = baseA + Math.sin(animalBob) * 0.05;
      mouseG.rotation.y += 0.015;

      // Update ring & number
      const secs    = Math.ceil(remaining);
      const arcEl   = document.getElementById('atimer-arc');
      const secsEl  = document.getElementById('atimer-secs');
      secsEl.textContent = secs;
      arcEl.style.strokeDashoffset = 94.25 * (1 - remaining / ANIMAL_LIFETIME);
      // colour: green → yellow → red
      const hue = Math.round((remaining / ANIMAL_LIFETIME) * 120);
      arcEl.style.stroke = `hsl(${hue},100%,55%)`;

      // Project 3D head pos → screen
      _timerVec.set(mouseG.position.x, mouseG.position.y + 0.55, mouseG.position.z);
      _timerVec.project(camera);
      const tx = (_timerVec.x + 1) / 2 * window.innerWidth;
      const ty = (-_timerVec.y + 1) / 2 * window.innerHeight;
      const timerEl = document.getElementById('animal-timer');
      timerEl.style.left = tx + 'px';
      timerEl.style.top  = ty + 'px';
    }
  }
  // Jaw animation — smooth open/close
  jawPivot.rotation.x += (mouthTarget * 0.58 - jawPivot.rotation.x) * 0.22;
  renderer.render(scene, camera);
}

function updateCam() {
  const a = window.innerWidth / window.innerHeight;
  camera.aspect = a;
  // Horizontal half-angle needed to contain the near grid corners ≈ 22°.
  // Derive vertical FOV so that h-half >= 22° at any aspect ratio, with a
  // floor of 25° so the scene never looks unnaturally zoomed in on wide screens.
  const hNeed = 22 * Math.PI / 180;
  const vNeed = Math.atan(Math.tan(hNeed) / a);
  camera.fov = (2 * Math.max(vNeed, 25 * Math.PI / 180)) * 180 / Math.PI;
  camera.updateProjectionMatrix();
}
updateCam();

window.addEventListener('resize', () => {
  renderer.setSize(window.innerWidth, window.innerHeight);
  updateCam();
});

// ── SKIN BUTTONS ──────────────────────────────────────────────────────────────
document.querySelectorAll('.skin-btn').forEach(btn => {
  btn.addEventListener('click', () => applySkin(+btn.dataset.skin));
});

// Apply saved skin + theme on boot
applySkin(+(localStorage.getItem('snk3d_skin') || 0));
applyThemeColors(0);

initGame();
animate(0);
</script>
